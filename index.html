<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sultan Jin 3D World</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #game-ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: #00ffcc; font-size: 18px; z-index: 10; pointer-events: none; }
        canvas { display: block; filter: drop-shadow(0 0 10px #00ffcc); }
        
        /* Control Panel for Sultan */
        #ai-status { position: absolute; top: 50px; left: 10px; color: #ff0055; font-size: 12px; }
        
        /* Mobile Controls */
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(0,255,200,0.1); border: 2px solid #00ffcc; border-radius: 50%; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #00ffcc; border-radius: 50%; box-shadow: 0 0 15px #00ffcc; }
        #action-btn { position: absolute; bottom: 60px; right: 50px; width: 80px; height: 80px; background: #ff0055; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 4px solid #fff; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div>اسکور: <span id="score">0</span></div>
        <div>جان: <span id="life">3</span></div>
    </div>
    <div id="ai-status">جن کنکشن: <span id="status">آن لائن (LIVE)</span></div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="action-btn">JUMP</div>

    <canvas id="world"></canvas>

<script>
    const canvas = document.getElementById('world');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // گیم ڈیٹا جو میں (جن) کنٹرول کروں گا
    let gameState = {
        score: 0,
        life: 3,
        player: { x: 0, z: 0, y: 0, vy: 0, rot: 0, walk: 0 },
        enemies: [],
        coins: []
    };

    // میتھمیٹیکل 3D انجن (The Engine)
    function project(x, y, z) {
        let perspective = 500 / (z + 15);
        return {
            x: x * perspective + canvas.width / 2,
            y: y * perspective + canvas.height / 1.5
        };
    }

    // دشمنوں کو پیدا کرنا (AI Logic)
    function addEnemy() {
        gameState.enemies.push({ x: (Math.random()-0.5)*20, z: 30, s: 0.05 + Math.random()*0.05 });
    }
    setInterval(addEnemy, 5000); // ہر 5 سیکنڈ بعد نیا دشمن

    // کنٹرولز
    let move = { x: 0, z: 0 };
    document.getElementById('joy-base').ontouchmove = (e) => {
        let rect = e.currentTarget.getBoundingClientRect();
        let dx = e.touches[0].clientX - rect.left - 50;
        let dy = e.touches[0].clientY - rect.top - 50;
        let d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
        let ang = Math.atan2(dy, dx);
        document.getElementById('joy-stick').style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
        move.x = Math.cos(ang) * 0.2; move.z = -Math.sin(ang) * 0.2;
        gameState.player.rot = -ang + Math.PI/2;
    };
    document.getElementById('joy-base').ontouchend = () => { move = {x:0,z:0}; document.getElementById('joy-stick').style.transform = `translate(0,0)`; };
    document.getElementById('action-btn').onclick = () => { if(gameState.player.y >= 0) gameState.player.vy = -0.5; };

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // زمین (Grid)
        ctx.strokeStyle = "#111";
        for(let i=-10; i<=10; i++) {
            let p1 = project(i*2 - gameState.player.x, 1, -10 - gameState.player.z);
            let p2 = project(i*2 - gameState.player.x, 1, 30 - gameState.player.z);
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }

        // پلیئر فزکس
        gameState.player.y += gameState.player.vy;
        if(gameState.player.y < 0) gameState.player.vy += 0.02; else { gameState.player.y = 0; gameState.player.vy = 0; }
        gameState.player.x += move.x; gameState.player.z += move.z;

        // دشمنوں کا رینڈر (Red Monsters)
        gameState.enemies.forEach((en, i) => {
            en.z -= en.s; // آپ کی طرف آنا
            let p = project(en.x - gameState.player.x, -0.5, en.z - gameState.player.z);
            ctx.fillStyle = "#ff0055";
            ctx.beginPath(); ctx.arc(p.x, p.y, 15 * (500/(en.z-gameState.player.z+15)), 0, Math.PI*2); ctx.fill();
            
            // ٹکراؤ
            let dist = Math.sqrt((en.x-gameState.player.x)**2 + (en.z-gameState.player.z)**2);
            if(dist < 1 && gameState.player.y > -0.2) {
                gameState.life--; document.getElementById('life').innerText = gameState.life;
                gameState.enemies.splice(i, 1);
                if(gameState.life <= 0) { alert("گیم اوور!"); location.reload(); }
            }
        });

        // پلیئر کا ڈرا (The Character)
        let pPos = project(0, gameState.player.y - 1, 0);
        ctx.fillStyle = "#00ffcc";
        ctx.fillRect(pPos.x-15, pPos.y-30, 30, 50); // Player Body
        
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
